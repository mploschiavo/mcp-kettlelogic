name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io under the
# com.kettlelogic/* namespace whenever a GitHub Release is published (and can be
# run manually). Authentication is HTTP domain ownership: the registry fetches
# https://kettlelogic.com/.well-known/mcp-registry-auth (served by the site) and
# verifies a signature made with the private key stored as the MCP_REGISTRY_KEY
# secret. No GitHub-namespace login involved — the listing brands as kettlelogic.
#
# One-time setup (see README "Publishing to the MCP registry"):
#   gh secret set MCP_REGISTRY_KEY --repo mploschiavo/mcp-kettlelogic \
#     --body "$(openssl pkey -in .secrets/mcp-registry-key.pem -outform DER | tail -c 32 | xxd -p -c 64)"

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar xz mcp-publisher

      - name: Align server.json version with the release tag
        if: github.event_name == 'release'
        run: |
          VER="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp)"
          jq --arg v "$VER" '.version = $v' server.json > "$tmp" && mv "$tmp" server.json
          echo "Publishing version $VER"

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Log in (HTTP domain ownership) and publish
        env:
          MCP_REGISTRY_KEY: ${{ secrets.MCP_REGISTRY_KEY }}
        run: |
          if [ -z "$MCP_REGISTRY_KEY" ]; then
            echo "::error::MCP_REGISTRY_KEY secret is not set — see README 'Publishing to the MCP registry'."
            exit 1
          fi
          ./mcp-publisher login http --domain kettlelogic.com --private-key "$MCP_REGISTRY_KEY"
          ./mcp-publisher publish
