name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io under the
# com.kettlelogic/* namespace on every GitHub Release (and via manual dispatch).
#
# Runs on a SELF-HOSTED runner in our cluster (deployments/github-runner in the
# private home repo) — so it costs zero GitHub-hosted minutes and doesn't fail when
# the monthly quota is drained. That runner mounts the Ed25519 signing key from an
# in-cluster Secret at /opt/mcp/key-hex, so the key never lives in GitHub secrets.
#
# Auth = HTTP domain ownership: the registry fetches
# https://kettlelogic.com/.well-known/mcp-registry-auth (served by the site) and
# verifies a signature made with that key.
#
# FALLBACKS if the runner is unavailable: re-run from the Actions tab, or run the
# always-works local script  scripts/publish-registry.sh  (zero infra).
#
# NOTE: bump `version` in server.json (+ version.py) BEFORE releasing — registry
# versions are immutable, so re-publishing an existing version fails by design.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: [self-hosted, linux, cluster]
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Log in (HTTP domain ownership) and publish
        run: |
          KEY_FILE=/opt/mcp/key-hex
          if [ ! -r "$KEY_FILE" ]; then
            echo "::error::$KEY_FILE not mounted — is the self-hosted runner (deployments/github-runner) up with the mcp-registry-key secret?"
            exit 1
          fi
          ./mcp-publisher login http --domain kettlelogic.com --private-key "$(cat "$KEY_FILE")"
          ./mcp-publisher publish
