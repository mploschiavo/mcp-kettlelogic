apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kettlelogic
  labels:
    app.kubernetes.io/name: mcp-kettlelogic
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-kettlelogic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-kettlelogic
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-kettlelogic
          # Immutable version tag (not :latest). CI re-pins to the digest.
          image: ghcr.io/mploschiavo/mcp-kettlelogic:1.0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: mcp-kettlelogic-config
          ports:
            - name: mcp
              containerPort: 8080
            - name: metrics
              containerPort: 9464
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
