# Local container run of the MCP server over the streamable-http transport.
# (For a desktop MCP client over stdio, just `pip install .` and use the
# `mcp-kettlelogic` command directly — no container needed.)
services:
  mcp-kettlelogic:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: ghcr.io/mploschiavo/mcp-kettlelogic:1.0.0
    environment:
      KETTLELOGIC_BASE_URL: https://kettlelogic.com
      KETTLELOGIC_TRANSPORT: streamable-http
      KETTLELOGIC_HTTP_HOST: 0.0.0.0
      KETTLELOGIC_HTTP_PORT: "8080"
      KETTLELOGIC_METRICS_PORT: "9464"
    ports:
      - "8080:8080"   # MCP (streamable-http)
      - "9464:9464"   # Prometheus metrics
    read_only: true
    user: "10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
